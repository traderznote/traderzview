name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    name: ${{ matrix.task }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # The six hard gates (roadmap §2). bench + conformance are no-ops until
        # M10 / M6 but are present from M0 so the pipeline shape is fixed.
        task: [verify, loc, size, test, bench, conformance]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.1.2
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run ${{ matrix.task }}
